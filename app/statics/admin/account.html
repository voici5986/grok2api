<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok2API - 账户管理</title>
  <link rel="icon" href="/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <style>
    body { background: #FAF9F5 }

    /* Page header */
    .page-hd   { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px }
    .page-title{ font-size:22px; font-weight:700; line-height:1.2 }
    .page-sub  { font-size:13px; color:var(--fg-muted); margin-top:5px }
    .page-actions { display:flex; gap:8px; align-items:center; flex-shrink:0 }

    /* Admin header layout */
    .admin-header { background:#FAF9F5; position:sticky; top:0; z-index:100 }
    .admin-header-inner {
      max-width:1280px;
      width:100%;
      height:54px;
      margin:0 auto;
      padding:0 28px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:nowrap;
      gap:0;
    }
    .admin-brand-wrap {
      display:flex;
      align-items:center;
      gap:8px;
      padding-right:20px;
      margin-right:20px;
      flex:0 0 auto;
      white-space:nowrap;
    }
    .admin-nav {
      display:flex;
      align-items:center;
      gap:0;
      flex:1 1 auto;
      min-width:0;
    }
    .admin-header-right {
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
      white-space:nowrap;
    }

    /* Stats */
    .stat-grid {
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:12px;
      margin-bottom:20px;
    }
    .stat-cell {
      min-height:88px;
      padding:14px 16px;
      border-radius:12px;
      background:#fff;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .stat-top {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .stat-label {
      font-size:11px;
      color:#8a8a8a;
      letter-spacing:.01em;
      white-space:nowrap;
    }
    .stat-icon {
      width:22px;
      height:22px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:#a3a3a3;
      flex:0 0 auto;
    }
    .stat-icon svg {
      width:14px;
      height:14px;
      stroke:currentColor;
    }
    .stat-num  {
      font-size:22px;
      font-weight:600;
      line-height:1;
      letter-spacing:-.02em;
      margin-top:auto;
    }
    .stat-muted { color:#a1a1aa !important; }

    /* Filter tabs — pill style */
    .filter-bar  { display:flex; align-items:center; gap:0; background:#efefef; padding:3px; border-radius:24px; align-self:flex-start; margin-bottom:16px }
    .ftab        { height:30px; padding:0 14px; border-radius:20px; font-size:13px; font-weight:500; color:var(--fg-muted); display:flex; align-items:center; gap:5px; transition:background .15s,color .15s; white-space:nowrap }
    .ftab:hover  { color:var(--fg) }
    .ftab.active { background:#fff; color:var(--fg); box-shadow:0 1px 3px rgba(0,0,0,.1) }
    .ftab-n      { font-size:12px; font-weight:600 }
    .ftab-n.c-green  { color:#16a34a }
    .ftab-n.c-orange { color:#ea580c }
    .ftab-n.c-red    { color:#dc2626 }
    .ftab-n.c-purple { color:#7c3aed }

    /* Toolbar row above table */
    .table-toolbar { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap }
    .table-toolbar-left { flex:1 }

    /* Table */
    .table-card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; overflow:hidden }
    table { width:100%; border-collapse:collapse }
    th { background:var(--bg-card); font-size:12px; font-weight:500; color:var(--fg-muted); padding:10px 16px; text-align:left; border-bottom:1px solid var(--border) }
    td { font-size:13px; padding:12px 16px; border-bottom:1px solid var(--border); vertical-align:middle }
    tr:last-child td { border-bottom:none }
    tr:hover td { background:#fafafa }

    /* Quota pills in table cell */
    .quota-cell  { display:flex; gap:4px; align-items:center }
    .q-pill      { font-size:11px; font-weight:600; padding:2px 6px; border-radius:5px }
    .q-a { background:#eff6ff; color:#2563eb }
    .q-f { background:#f0fdf4; color:#16a34a }
    .q-e { background:#faf5ff; color:#7c3aed }
    .q-z { background:#f4f4f5; color:#aaa }

    /* Token monospace */
    .tok { font-family:ui-monospace,monospace; font-size:12px; color:#333 }

    /* Pagination */
    .pagi { display:flex; align-items:center; gap:6px; padding:12px 16px; border-top:1px solid var(--border) }
    .pagi-info { font-size:13px; color:var(--fg-muted) }
    .pagi-btn  { width:28px; height:28px; border-radius:6px; font-size:13px; display:inline-flex; align-items:center; justify-content:center; color:var(--fg-muted); transition:background .1s }
    .pagi-btn:hover  { background:var(--border) }
    .pagi-btn.on     { background:var(--fg); color:#fff }
    .pagi-btn:disabled { opacity:.35; pointer-events:none }

    /* Import modal */
    #modal-import-file .modal { width:min(420px,92vw) }
    .import-file-input { position:absolute; width:1px; height:1px; opacity:0; pointer-events:none }
    .import-file-row { display:flex; align-items:center; gap:10px }
    .import-file-name {
      font-size:12px;
      color:#666;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
      flex:1;
    }
    .import-file-name.empty { color:#999 }
    .import-field { display:flex; align-items:center; gap:10px }
    .import-field-label { font-size:13px; color:var(--fg-muted); white-space:nowrap }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<div id="admin-header" data-active="/admin/account"></div>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<main class="admin-main">

  <!-- Page heading -->
  <div class="page-hd">
    <div>
      <div class="page-title">账户列表</div>
      <div class="page-sub">管理 Grok2API 的 xAI 服务账户池。</div>
    </div>
    <div class="page-actions">
      <button onclick="openImport()" class="btn btn-ghost" style="gap:6px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        导入
      </button>
      <button onclick="openAdd()" class="btn btn-primary" style="gap:6px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        添加
      </button>
    </div>
  </div>

  <!-- Stats 2×4 -->
  <div class="stat-grid">
    <div class="stat-cell">
      <div class="stat-top">
        <div class="stat-label">账户总数</div>
        <span class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M4 19a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4"/><circle cx="12" cy="8" r="4"/></svg>
        </span>
      </div>
      <div class="stat-num" id="s-total">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-top">
        <div class="stat-label">账户正常</div>
        <span class="stat-icon" style="color:#16a34a">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="m5 12 4.2 4.2L19 6.5"/></svg>
        </span>
      </div>
      <div class="stat-num" id="s-active" style="color:#16a34a">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-top">
        <div class="stat-label">账户限流</div>
        <span class="stat-icon" style="color:#ea580c">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="8"/></svg>
        </span>
      </div>
      <div class="stat-num" id="s-cooling" style="color:#ea580c">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-top">
        <div class="stat-label">账户失效</div>
        <span class="stat-icon" style="color:#dc2626">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="m15 9-6 6m0-6 6 6"/><circle cx="12" cy="12" r="8"/></svg>
        </span>
      </div>
      <div class="stat-num" id="s-invalid" style="color:#dc2626">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-top">
        <div class="stat-label">Auto 剩余</div>
        <span class="stat-icon" style="color:#2563eb">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M4 12h16M12 4v16"/><circle cx="12" cy="12" r="8"/></svg>
        </span>
      </div>
      <div class="stat-num" id="s-qa" style="color:#2563eb">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-top">
        <div class="stat-label">Fast 剩余</div>
        <span class="stat-icon" style="color:#16a34a">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M13 4 6 14h5l-1 6 8-12h-5z"/></svg>
        </span>
      </div>
      <div class="stat-num" id="s-qf" style="color:#16a34a">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-top">
        <div class="stat-label">Expert 剩余</div>
        <span class="stat-icon" style="color:#7c3aed">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.8 1-6.1-4.4-4.3 6.1-.9z"/></svg>
        </span>
      </div>
      <div class="stat-num" id="s-qe" style="color:#7c3aed">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-top">
        <div class="stat-label">总调用次数</div>
        <span class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M12 6v6l4 2"/><path d="M5 4v4M19 4v4"/><path d="M4 10h16"/><rect x="4" y="6" width="16" height="14" rx="2"/></svg>
        </span>
      </div>
      <div class="stat-num" id="s-calls">0</div>
    </div>
  </div>

  <!-- Filter tabs -->
  <div class="filter-bar">
    <button class="ftab active" data-tab="all"     onclick="switchTab('all')">全部 <span class="ftab-n" id="tc-all">0</span></button>
    <button class="ftab"        data-tab="active"  onclick="switchTab('active')">正常 <span class="ftab-n c-green"  id="tc-active">0</span></button>
    <button class="ftab"        data-tab="cooling" onclick="switchTab('cooling')">限流 <span class="ftab-n c-orange" id="tc-cooling">0</span></button>
    <button class="ftab"        data-tab="invalid" onclick="switchTab('invalid')">失效 <span class="ftab-n c-red"    id="tc-invalid">0</span></button>
    <button class="ftab"        data-tab="nsfw"    onclick="switchTab('nsfw')">已开 NSFW <span class="ftab-n c-purple" id="tc-nsfw">0</span></button>
    <button class="ftab"        data-tab="nonsfw"  onclick="switchTab('nonsfw')">未开 NSFW <span class="ftab-n" id="tc-nonsfw">0</span></button>
  </div>

  <!-- Toolbar -->
  <div class="table-toolbar">
    <div class="table-toolbar-left" style="display:flex;align-items:center;gap:6px">
      <button onclick="prevPage()" class="pagi-btn" id="btn-prev">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="pagi-info" id="pagi-info">第 0/0 页 · 共 0 条</span>
      <button onclick="nextPage()" class="pagi-btn" id="btn-next">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <button onclick="doExport()"       class="btn btn-ghost btn-sm">导出</button>
    <button onclick="batchNSFW()"      id="btn-nsfw"    class="btn btn-ghost  btn-sm" style="display:none">开启 NSFW</button>
    <button onclick="batchRefreshSel()"id="btn-refresh" class="btn btn-ghost  btn-sm" style="display:none">刷新选中</button>
    <button onclick="batchDeleteSel()" id="btn-delete"  class="btn btn-danger btn-sm" style="display:none">删除选中</button>
    <div style="margin-left:4px">
      <select class="input btn-sm" id="page-size-sel" onchange="changePageSize(this.value)" style="width:90px">
        <option value="20">20 / 页</option>
        <option value="50">50 / 页</option>
        <option value="100">100 / 页</option>
      </select>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width:36px"><input type="checkbox" class="cb" id="cb-all" onchange="toggleAll(this.checked)"></th>
          <th>Token</th>
          <th>类型</th>
          <th>状态</th>
          <th>额度 <span style="font-weight:400;color:#bbb;font-size:11px">A · F · E</span></th>
          <th>调用</th>
          <th>最近使用</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</main>

<!-- ── Add Modal ───────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-import">
  <div class="modal">
    <div class="modal-title">添加账户</div>
    <div style="display:grid;gap:10px">
      <div>
        <div style="font-size:12px;color:var(--fg-muted);margin-bottom:6px">每行一个 Token（已存在的将跳过）</div>
        <textarea class="input" id="import-tokens" rows="8" placeholder="粘贴 Token，每行一个..."></textarea>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:13px;color:var(--fg-muted);white-space:nowrap">类型</span>
        <select class="input" id="import-pool" style="flex:1"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal('modal-import')" class="btn btn-ghost">取消</button>
      <button onclick="doAdd()" class="btn btn-primary">添加</button>
    </div>
  </div>
</div>

<!-- ── Import Modal ────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-import-file">
  <div class="modal">
    <div class="modal-title">导入 TXT</div>
    <div style="display:grid;gap:10px">
      <div>
        <div style="font-size:12px;color:var(--fg-muted);margin-bottom:6px">选择 `.txt` 文件，每行一个 Token</div>
        <input class="import-file-input" id="import-file" type="file" accept=".txt,text/plain" onchange="updateImportFileState()">
        <div class="import-file-row">
          <label for="import-file" class="btn btn-ghost">选择文件</label>
          <div class="import-file-name empty" id="import-file-name">未选择文件</div>
        </div>
      </div>
      <div class="import-field">
        <span class="import-field-label">类型</span>
        <select class="input" id="import-file-pool" style="flex:1"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal('modal-import-file')" class="btn btn-ghost">取消</button>
      <button onclick="doImport()" class="btn btn-primary">导入</button>
    </div>
  </div>
</div>

<!-- ── Confirm Modal ───────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal" style="max-width:400px">
    <div class="modal-title" id="confirm-title">确认</div>
    <div id="confirm-body" style="font-size:13px;color:var(--fg-muted);line-height:1.7"></div>
    <div class="modal-footer">
      <button onclick="closeModal('modal-confirm')" class="btn btn-ghost">取消</button>
      <button onclick="_cb&&_cb()" class="btn btn-danger">确认</button>
    </div>
  </div>
</div>

<script src="/static/js/i18n.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/admin-header.js"></script>
<script src="/static/js/toast.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let allTokens = [], curTab = 'all', curPage = 1, pageSize = 20;
const sel = new Set();
let _cb = null;

// ── Boot ───────────────────────────────────────────────────────────────────
(async () => {
  await renderAdminHeader?.();
  const key = await adminKey.get();
  if (!key || !await verifyKey(ADMIN_API + '/verify', key).catch(() => false))
    return location.href = '/admin/login';
  loadMeta();
  load();
})();

async function loadMeta() {
  try {
    const d = await _api('GET', '/status');
    const el = document.getElementById('hd-backend');
    if (d?.status === 'ok') {
      el.textContent = `${d.size ?? 0} accounts`;
      el.className = 'admin-badge admin-badge-green';
    } else {
      el.textContent = 'OFFLINE'; el.className = 'admin-badge admin-badge-blue';
    }
  } catch { document.getElementById('hd-backend').style.display = 'none'; }
}

// ── API ────────────────────────────────────────────────────────────────────
async function _api(method, path, body) {
  const key = await adminKey.get();
  const r = await fetch(ADMIN_API + path, {
    method,
    headers: { ...(body != null && { 'Content-Type': 'application/json' }), Authorization: `Bearer ${key}` },
    ...(body != null && { body: JSON.stringify(body) }),
  });
  if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.detail || r.status); }
  return r.json();
}

// ── Load ───────────────────────────────────────────────────────────────────
async function load() {
  try {
    const data = await _api('GET', '/tokens');
    allTokens = [];
    for (const [pool, items] of Object.entries(data.tokens || {}))
      items.forEach(t => allTokens.push({ ...t, pool }));
    render();
  } catch (e) { showToast('加载失败: ' + e.message, 'error'); }
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() { renderStats(); renderTabs(); renderTable(); }

function renderStats() {
  const active  = allTokens.filter(t => t.status === 'active').length;
  const cooling = allTokens.filter(t => t.status === 'cooling').length;
  const invalid = allTokens.filter(t => !['active','cooling'].includes(t.status)).length;
  const calls   = allTokens.reduce((s, t) => s + (t.use_count || 0), 0);
  let qa = 0, qf = 0, qe = 0;
  for (const t of allTokens) {
    const q = t.quota || {};
    qa += q.auto?.remaining   || 0;
    qf += q.fast?.remaining   || 0;
    qe += q.expert?.remaining || 0;
  }
  $('s-total',   allTokens.length);
  $('s-active',  active);
  $('s-cooling', cooling);
  $('s-invalid', invalid);
  $('s-qa', fmt(qa)); $('s-qf', fmt(qf)); $('s-qe', fmt(qe));
  $('s-calls', fmt(calls));
}

function renderTabs() {
  const nsfw   = allTokens.filter(t => (t.tags||[]).includes('nsfw')).length;
  const nonsfw = allTokens.length - nsfw;
  $('tc-all',     allTokens.length);
  $('tc-active',  allTokens.filter(t => t.status === 'active').length);
  $('tc-cooling', allTokens.filter(t => t.status === 'cooling').length);
  $('tc-invalid', allTokens.filter(t => !['active','cooling'].includes(t.status)).length);
  $('tc-nsfw',    nsfw);
  $('tc-nonsfw',  nonsfw);
}

function filtered() {
  if (curTab === 'all')     return allTokens;
  if (curTab === 'invalid') return allTokens.filter(t => !['active','cooling'].includes(t.status));
  if (curTab === 'nsfw')    return allTokens.filter(t => (t.tags||[]).includes('nsfw'));
  if (curTab === 'nonsfw')  return allTokens.filter(t => !(t.tags||[]).includes('nsfw'));
  return allTokens.filter(t => t.status === curTab);
}

function renderTable() {
  const items = filtered(), total = items.length;
  const pages = Math.max(1, Math.ceil(total / pageSize));
  if (curPage > pages) curPage = pages;
  const slice = items.slice((curPage - 1) * pageSize, curPage * pageSize);

  document.getElementById('tbody').innerHTML = slice.length
    ? slice.map(rowHtml).join('')
    : `<tr><td colspan="9" class="empty-state">暂无 Token，请点击右上角导入或添加。</td></tr>`;

  $('pagi-info', `第 ${total ? curPage : 0}/${pages} 页 · 共 ${total} 条`);
  const prev = document.getElementById('btn-prev'), next = document.getElementById('btn-next');
  prev.disabled = curPage <= 1; next.disabled = curPage >= pages;
  updateBatchBtns();
}

function rowHtml(t) {
  const q      = t.quota || {};
  const isNsfw = (t.tags || []).includes('nsfw');
  const nsfwBadge = isNsfw
    ? `<span class="badge" style="background:#fdf4ff;color:#9333ea;margin-left:4px">NSFW</span>`
    : '';
  const nsfwBtn = isNsfw
    ? `<button class="btn btn-xs" style="background:#fdf4ff;color:#9333ea;border:1px solid #e9d5ff" disabled title="已开启">NSFW ✓</button>`
    : `<button onclick="nsfwOne('${xe(t.token)}')" class="btn btn-ghost btn-xs">开启 NSFW</button>`;
  return `<tr>
    <td><input type="checkbox" class="cb row-cb" data-token="${xe(t.token)}" ${sel.has(t.token)?'checked':''} onchange="toggleRow(this)"></td>
    <td><span class="tok">${mask(t.token)}</span>
        <button onclick="copy('${xe(t.token)}')" class="btn btn-ghost btn-xs" style="margin-left:6px;color:var(--fg-muted)">复制</button></td>
    <td><span class="badge badge-${t.pool||'basic'}">${t.pool||'basic'}</span>${nsfwBadge}</td>
    <td>${statusBadge(t.status)}</td>
    <td><div class="quota-cell">${qpills(q)}</div></td>
    <td style="font-variant-numeric:tabular-nums;color:var(--fg-muted)">${t.use_count||0}</td>
    <td style="font-size:12px;color:var(--fg-muted)">${fmtDate(t.last_used_at)}</td>
    <td><div class="action-btns">
      <button onclick="refreshOne('${xe(t.token)}')" class="btn btn-ghost btn-xs">刷新 Usage</button>
      ${nsfwBtn}
      <button onclick="doDelete([${JSON.stringify(t.token)}])" class="btn btn-danger btn-xs">删除</button>
    </div></td>
  </tr>`;
}

function qpills(q) {
  return [['auto','A','q-a'],['fast','F','q-f'],['expert','E','q-e']].map(([m,l,c]) => {
    const r = q[m]?.remaining ?? null;
    return `<span class="q-pill ${r ? c : 'q-z'}" title="${m}: ${r ?? '未知'}/${q[m]?.total??'?'}">${l}:${r ?? '?'}</span>`;
  }).join('');
}

// ── Nav & Pagination ────────────────────────────────────────────────────────
function switchTab(tab) {
  curTab = tab; curPage = 1; sel.clear();
  document.querySelectorAll('.ftab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  renderTable();
}
function prevPage() { if (curPage > 1) { curPage--; renderTable(); } }
function nextPage() { const pages = Math.max(1, Math.ceil(filtered().length / pageSize)); if (curPage < pages) { curPage++; renderTable(); } }
function changePageSize(v) { pageSize = +v; curPage = 1; renderTable(); }

function toggleAll(checked) {
  filtered().slice((curPage-1)*pageSize, curPage*pageSize).forEach(t => checked ? sel.add(t.token) : sel.delete(t.token));
  document.querySelectorAll('.row-cb').forEach(el => el.checked = checked);
  updateBatchBtns();
}
function toggleRow(el) {
  el.checked ? sel.add(el.dataset.token) : sel.delete(el.dataset.token);
  const page = filtered().slice((curPage-1)*pageSize, curPage*pageSize);
  const cbAll = document.getElementById('cb-all');
  cbAll.checked = page.every(t => sel.has(t.token));
  cbAll.indeterminate = !cbAll.checked && sel.size > 0;
  updateBatchBtns();
}
function updateBatchBtns() {
  ['btn-nsfw','btn-refresh','btn-delete'].forEach(id =>
    document.getElementById(id).style.display = sel.size ? '' : 'none');
}

// ── Helpers ────────────────────────────────────────────────────────────────
function $(id, v) { const el = document.getElementById(id); if (el) el.textContent = v; }
function fmt(n) { return n >= 10000 ? (n/1000).toFixed(1)+'k' : n; }
function mask(t) { return t.length > 20 ? t.slice(0,8) + '…' + t.slice(-8) : t; }
function xe(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(typeof d === 'number' ? d : d);
  return isNaN(dt) ? '—' : dt.toLocaleDateString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function statusBadge(s) {
  const m = {active:['badge-active','正常'], cooling:['badge-cooling','限流'], expired:['badge-expired','过期'], invalid:['badge-invalid','失效']};
  const [cls, label] = m[s] || ['badge-invalid', s||'未知'];
  return `<span class="badge ${cls}">${label}</span>`;
}
async function copy(t) {
  try { await navigator.clipboard.writeText(t); showToast('已复制', 'success'); }
  catch { showToast('复制失败', 'error'); }
}

// ── Add / Import ───────────────────────────────────────────────────────────
function fillPoolOptions(id) {
  const pools = [...new Set(['basic','super',...allTokens.map(t => t.pool||'basic')])];
  document.getElementById(id).innerHTML = pools.map(p => `<option value="${p}">${p}</option>`).join('');
}

function openAdd() {
  document.getElementById('import-tokens').value = '';
  fillPoolOptions('import-pool');
  openModal('modal-import');
}

function openImport() {
  document.getElementById('import-file').value = '';
  updateImportFileState();
  fillPoolOptions('import-file-pool');
  openModal('modal-import-file');
}

async function doAdd() {
  const raw  = document.getElementById('import-tokens').value;
  const pool = document.getElementById('import-pool').value;
  const newToks = raw.split('\n').map(s => s.trim()).filter(Boolean);
  if (!newToks.length) return showToast('请输入 Token', 'error');
  return saveTokens(pool, newToks, 'modal-import', '添加完成', '添加失败');
}

async function doImport() {
  const file = document.getElementById('import-file').files?.[0];
  const pool = document.getElementById('import-file-pool').value;
  if (!file) return showToast('请选择 TXT 文件', 'error');
  if (!file.name.toLowerCase().endsWith('.txt')) return showToast('仅支持导入 TXT 文件', 'error');
  const raw = await file.text().catch(() => '');
  const newToks = raw.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  if (!newToks.length) return showToast('TXT 文件中没有可导入的 Token', 'error');
  return saveTokens(pool, newToks, 'modal-import-file', '导入完成', '导入失败');
}

function updateImportFileState() {
  const file = document.getElementById('import-file').files?.[0];
  const el = document.getElementById('import-file-name');
  if (!el) return;
  el.textContent = file ? file.name : '未选择文件';
  el.classList.toggle('empty', !file);
}

async function saveTokens(pool, newToks, modalId, successPrefix, errorPrefix) {
  const existing = allTokens.filter(t => t.pool === pool).map(t => t.token);
  const merged = [...new Set([...existing, ...newToks])];
  const added = merged.length - existing.length;
  try {
    await _api('PUT', '/tokens/pool', { pool, tokens: merged });
    closeModal(modalId);
    showToast(`${successPrefix}，新增 ${added} 个`, 'success');
    load();
  } catch (e) { showToast(`${errorPrefix}: ` + e.message, 'error'); }
}

// ── Export ─────────────────────────────────────────────────────────────────
function doExport() {
  const out = {};
  filtered().forEach(t => (out[t.pool||'basic'] = out[t.pool||'basic']||[]).push({token:t.token,tags:t.tags||[]}));
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(out,null,2)],{type:'application/json'}));
  a.download = `tokens-${curTab}.json`; a.click();
}

// ── Delete ─────────────────────────────────────────────────────────────────
function doDelete(tokens) {
  const n = tokens.length;
  openConfirm('确认删除',
    `确认删除 ${n===1 ? `<code>${mask(tokens[0])}</code>` : `<b>${n}</b> 个账户`}？<br><small style="color:var(--error)">此操作不可撤销。</small>`,
    async () => {
      try {
        await _api('DELETE', '/tokens', tokens);
        tokens.forEach(t => sel.delete(t));
        showToast(`已删除 ${n} 个`, 'success');
        load();
      } catch (e) { showToast('删除失败: ' + e.message, 'error'); }
    });
}
function batchDeleteSel() { if (sel.size) doDelete([...sel]); }

// ── Refresh ────────────────────────────────────────────────────────────────
async function refreshOne(token) {
  try {
    const d = await _api('POST', '/batch/refresh', { tokens:[token] });
    showToast(`刷新完成：成功 ${d.summary?.ok??0}，失败 ${d.summary?.fail??0}`, 'success');
    load();
  } catch (e) { showToast('刷新失败: ' + e.message, 'error'); }
}
async function batchRefreshSel() {
  if (!sel.size) return;
  const tokens = [...sel];
  showToast(`正在刷新 ${tokens.length} 个账户…`, 'success');
  try {
    const d = await _api('POST', '/batch/refresh', { tokens });
    showToast(`刷新完成：成功 ${d.summary?.ok??0}，失败 ${d.summary?.fail??0}`, 'success');
    load();
  } catch (e) { showToast('刷新失败: ' + e.message, 'error'); }
}

// ── NSFW ───────────────────────────────────────────────────────────────────
async function nsfwOne(token) {
  try {
    const d = await _api('POST', '/batch/nsfw', { tokens: [token] });
    showToast(`NSFW 已开启：成功 ${d.summary?.ok??0}，失败 ${d.summary?.fail??0}`, 'success');
    load();
  } catch (e) { showToast('操作失败: ' + e.message, 'error'); }
}

function batchNSFW() {
  if (!sel.size) return;
  const tokens = [...sel];
  openConfirm('开启 NSFW', `为选中的 <b>${tokens.length}</b> 个账户开启 NSFW？`, async () => {
    try {
      const d = await _api('POST', '/batch/nsfw', { tokens });
      showToast(`NSFW 完成：成功 ${d.summary?.ok??0}，失败 ${d.summary?.fail??0}`, 'success');
      load();
    } catch (e) { showToast('操作失败: ' + e.message, 'error'); }
  });
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openConfirm(title, body, cb) {
  _cb = async () => { closeModal('modal-confirm'); await cb(); };
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').innerHTML = body;
  openModal('modal-confirm');
}
document.querySelectorAll('.modal-overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); }));
</script>
