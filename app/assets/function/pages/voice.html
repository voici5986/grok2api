<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="voice.pageTitle">Grok2API - LiveKit 陪聊</title>
  <link rel="icon" href="/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.7.3/dist/livekit-client.umd.min.js"></script>
</head>
<body>
  <div class="page">
    <div id="app-header" data-type="function"></div>

    <main class="page-body wide fade-in">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-2xl font-semibold" data-i18n="voice.title">LiveKit 陪聊</h2>
          <p class="text-sm text-muted mt-1" data-i18n="voice.subtitle">LiveKit 语音会话，连接 Grok Voice。</p>
        </div>
        <div class="flex gap-2">
          <button id="startBtn" class="btn btn-primary gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <span data-i18n="voice.startSession">开始会话</span>
          </button>
          <button id="stopBtn" class="btn btn-outline gap-2 hidden">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14"/></svg>
            <span data-i18n="voice.stopSession">停止会话</span>
          </button>
        </div>
      </div>
      <div class="divider"></div>

      <div class="voice-grid">
        <section>
          <div class="voice-card">
            <div class="card-title" data-i18n="voice.connectionSettings">连接设置</div>
            <div class="form-grid">
              <div>
                <label class="field-label" data-i18n="voice.voiceLabel">声音</label>
                <select id="voiceSelect" class="input">
                  <option value="ara" selected>Ara</option><option value="eve">Eve</option>
                  <option value="leo">Leo</option><option value="rex">Rex</option>
                  <option value="sal">Sal</option><option value="gork">Gork</option>
                </select>
              </div>
              <div>
                <label class="field-label" data-i18n="voice.personalityLabel">个性</label>
                <select id="personalitySelect" class="input">
                  <option value="assistant" selected>Assistant</option><option value="custom">Custom</option>
                  <option value="therapist">Therapist</option><option value="storyteller">Storyteller</option>
                  <option value="kids_story_time">Kids Story Time</option><option value="meditation">Meditation</option>
                  <option value="unhinged">Unhinged 18+</option><option value="sexy">Sexy 18+</option>
                </select>
              </div>
              <div style="grid-column:1/-1">
                <div class="flex items-center justify-between mb-1">
                  <label class="field-label" data-i18n="voice.speedLabel">语速</label>
                  <span class="range-value"><span id="speedValue">1.0</span>x</span>
                </div>
                <input type="range" id="speedRange" min="0.5" max="2.0" step="0.1" value="1.0" style="width:100%">
              </div>
            </div>
          </div>
          <div class="voice-card">
            <div class="voice-log-header">
              <div class="card-title" data-i18n="voice.sessionLog">会话日志</div>
              <div class="flex gap-2">
                <button id="clearLogBtn" class="btn btn-outline btn-sm">清空</button>
                <button id="copyLogBtn" class="btn btn-outline btn-sm">复制</button>
              </div>
            </div>
            <div id="log" class="voice-log"></div>
          </div>
        </section>
        <aside>
          <div class="voice-card">
            <div class="voice-log-header">
              <div class="card-title" data-i18n="voice.sessionStatus">状态</div>
              <span id="statusText" class="status-text">未连接</span>
            </div>
            <div class="meta-grid">
              <div class="meta-item"><div class="meta-label">Voice</div><div id="statusVoice" class="meta-value">-</div></div>
              <div class="meta-item"><div class="meta-label">Personality</div><div id="statusPersonality" class="meta-value">-</div></div>
              <div class="meta-item"><div class="meta-label">Speed</div><div id="statusSpeed" class="meta-value">-</div></div>
              <div class="meta-item"><div class="meta-label">LiveKit</div><div class="meta-value">wss://livekit.grok.com</div></div>
            </div>
            <div class="visualizer" id="visualizer"></div>
          </div>
          <div class="voice-card">
            <div class="card-title" data-i18n="voice.audioOutput">音频输出</div>
            <div id="audioRoot" class="mt-2"></div>
          </div>
        </aside>
      </div>
    </main>

    <div id="app-footer"></div>
  </div>
  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/js/core/auth.js"></script>
  <script src="/static/js/core/toast.js"></script>
  <script src="/static/js/core/header.js"></script>
  <script src="/static/js/webui/voice.js"></script>
</body>
</html>
