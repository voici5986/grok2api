<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="config.pageTitle">Grok2API - 配置管理</title>
  <link rel="icon" href="/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
  <div class="page">
    <div id="app-header" data-type="admin"></div>

    <main class="page-body fade-in">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-2xl font-semibold" data-i18n="config.title">配置管理</h2>
          <p class="text-sm text-muted mt-1" data-i18n="config.subtitle">管理 API 密钥及系统参数设置。</p>
        </div>
        <button onclick="saveConfig()" id="save-btn" class="btn btn-primary gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span data-i18n="common.save">保存</span>
        </button>
      </div>
      <div class="divider"></div>
      <div id="config-container">
        <div class="text-center py-2 text-muted" data-i18n="common.loading">加载中...</div>
      </div>
    </main>

    <div id="app-footer"></div>
  </div>

  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/js/core/auth.js"></script>
  <script src="/static/js/core/toast.js"></script>
  <script src="/static/js/core/ui.js"></script>
  <script src="/static/js/core/header.js"></script>
  <script src="/static/js/admin/config.js"></script>
</body>
</html>
